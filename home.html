<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | home</title>
    <link rel="shortcut icon" href="imajes/logo.png" type="image/x-icon">


    <!-- tailwind+daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<!-- font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

            <!-- icons -->
             <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
    *{
        font-family: "Work Sans", sans-serif;
    }
</style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
   <header class="border-b-2 border-gray-300 sticky top-0 bg-gray-100 z-10" >
    <section class="w-11/12 mx-auto py-3  flex justify-between items-center ">
        <div class="lift flex gap-1">
            <div class="logo w-[60px]">
                <img src="imajes/logo.png" alt=""></div>
                <div class="blance-info">
                <h2 class="text-2xl font-bold"> $ <span id="balance">45000</span></h2>
                 <p class="text-neutral/50">Available Balance</p>
            </div>
        </div>
        <div class="right">
            <a href="/index.html" class="btn btn-soft text-neutral/50" type="button"> <i class="fa-solid fa-arrow-right-from-bracket "></i> Logout</a>
            
        </div>
         
    </section>
   </header>

   <section class="w-11/12 mx-auto space-y-5">
    <h2 class="text-3xl font-bold pt-10">Welcome to pay<span class="text-primary">oo</span></h2>
     <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

     <div class="buttons grid grid-cols-3 gap-4" >
        <button onclick="showOnely('add-money')" type="button" class="btn flex-col h-full py-4 btn-primary btn-soft ">
            <img src="imajes/opt-1.png" alt="">
            <p>Add Money</p>
        </button>
        <button onclick="showOnely('cashout')" type="button" class="btn flex-col h-full py-4 btn-soft btn-primary ">
            <img src="imajes/opt-2.png" alt="">
            <p>Cashout</p>
        </button>
        <button type="button" class="btn flex-col h-full py-4 btn-soft btn-primary">
            <img src="imajes/opt-3.png" alt="">
            <p>Transfer Money</p>
        </button>
        <button type="button" class="btn flex-col h-full py-4 btn-soft btn-primary">
            <img src="imajes/opt-4.png" alt="">
            <p>Get Bonus</p>
        </button>
        <button type="button" class="btn flex-col h-full py-4 btn-soft btn-primary">
            <img src="imajes/opt-5.png" alt="">
            <p>Pay Bill</p>
        </button>
        <button onclick="showOnely('History')" type="button" class="btn flex-col h-full py-4 btn-soft btn-primary">
            <img src="imajes/opt-6.png" alt="">
            <p>Transactions</p>
        </button>
     </div>

   </section>

         <section id="add-money" class="w-11/12 mx-auto py-5 hidden">
            <h2 class="text-xl font-bold mb-5">Add Money</h2>
            
            <div class="card bg-base-100 w-full shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
           <label class="label text-neutral font-bold">select Bank</label>
           <select id="add-money-bank" class="select w-full bg-base-200 rounded-full">
  <option disabled selected>select A Bank</option>
  <option value="Dbbl">Dbbl</option>
  <option value="Ibbl">Ibbl</option>
  <option value="sity">sity bank</option>
</select>

            <br>
          <label class="label text-neutral font-bold">Bank Account Number</label>
          <input id="add-money-number" value="01912345678" type="text" maxlength="11" minlength="11" class="input rounded-full w-full bg-base-200" placeholder="Enter bank 11 disit Number" />
          <label class="label text-neutral font-bold">Amount to add</label>
          <input id="add-money-amount"  type="number" maxlength="11" minlength="11" class="input rounded-full w-full bg-base-200" placeholder="Enter amount to add" />
          <br>
          <label class="label text-neutral font-bold">4 Digit Pin</label>
          <input id="add-money-pin" type="password" maxlength="4" class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 Digit Pin" />
          
          <button id="add-money-btn" class="btn btn-neutral mt-4 rounded-full bg-[#3B25C1] text-bold">Add MOney</button>
        </fieldset>
      </div>
    </div>

         </section>

   <section id="cashout" class="w-11/12 mx-auto py-5 hidden"  >
    <h2 class="text-xl font-bold mb-5">Cashout</h2>
    <div class="card bg-base-100 w-full shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Agent Number</label>
          <input id="cashout-number" value="01912345678" type="text" maxlength="11" minlength="11" class="input rounded-full w-full bg-base-200" placeholder="Enter your 11 disit Number" />
          <label class="label text-neutral font-bold">Amount</label>
          <input id="cashout-amount"  type="number" maxlength="11" minlength="11" class="input rounded-full w-full bg-base-200" placeholder="Enter amount for withdraw" />

          <br>

          <label class="label text-neutral font-bold">4 Digit Pin</label>
          <input id="cashout-pin" type="password" maxlength="4" class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 Digit Pin" />
          
          <button id="cashout-btn" class="btn btn-neutral mt-4 rounded-full bg-[#3B25C1] text-bold">Withdraw Money</button>
        </fieldset>
      </div>
    </div>
   </section>


   <section  id="History" class="w-11/12 mx-auto py-5 hidden">
    <h2 class="text-xl font-bold mb-5">Transaction History</h2>
<div class="space-y-5" id="history-container">
    
</div>
   </section>
   <script src="script/machine.js"></script>
   <script src="script/addMoney.js"></script>
 <script src="script/cashout.js"></script>
 
</body>
</html>
