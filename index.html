<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Login</title>
    <link rel="shortcut icon" href="imajes/logo.png" type="image/x-icon">


    <!-- tailwind+daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<!-- font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

            <!-- icons -->
             <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
    *{
        font-family: "Work Sans", sans-serif;
    }
</style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
   
    <div class="logo w-[200px] mx-auto pt-32">
        <img src="imajes/Logo-full.png" alt="main logo">
    </div>
    <div class="form pt-10">
         <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Mobile Number</label>
          <input id="input-number" value="01912345678" type="text" maxlength="11" minlength="11" class="input rounded-full bg-base-200" placeholder="Enter your 11 disit Number" />

          <br>

          <label class="label text-neutral font-bold">4 Digit Pin</label>
          <input id="input-pin" type="password" maxlength="4" class="input rounded-full bg-base-200" placeholder="Enter 4 Digit Pin" />
          
          <button id="login-btn" class="btn btn-neutral mt-4 rounded-full bg-[#3B25C1] text-bold">Login</button>
        </fieldset>
      </div>
    </div>
    </div>
    <script src="script/login.js"></script>
    <script src="script/demo.js"></script>
</body>
</html>
